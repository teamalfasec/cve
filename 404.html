<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { color: #f85149; font-size: 72px; margin: 0; }
        p { font-size: 18px; margin: 20px 0; }
        .timer { color: #58a6ff; font-weight: bold; }
        .btn-home {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.2s;
        }
        .btn-home:hover { background-color: #2ea44f; }
    </style>
    
    <script>
        let seconds = 3;
        function countdown() {
            seconds--;
            document.getElementById('seconds').innerText = seconds;
            if (seconds <= 0) {
                window.location.href = "index.html";
            } else {
                setTimeout(countdown, 1000);
            }
        }
        window.onload = countdown;
    </script>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <p>Ops! Ei page-ti khuje paoya jayni.</p>
    <p>Apnake <span class="timer" id="seconds">3</span> second por <b>Main Index</b>-e niye jaoya hocche...</p>
    <a href="index.html" class="btn-home">Go Back Now</a>
</div>

</body>
</html>
