<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE Repo - File Index</title>
    <style>
        :root {
            --primary: #2ea44f;
            --bg: #0d1117;
            --text: #c9d1d9;
            --card-bg: #161b22;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 24px; color: #58a6ff; }

        #file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .file-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .file-card:hover {
            transform: translateY(-3px);
            border-color: #8b949e;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        button, a {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border);
            background: #21262d;
            color: #c9d1d9;
        }

        .btn-open { background-color: var(--primary); color: white; border: none; }
        .btn-open:hover { background-color: #2c974b; }
        
        .btn-copy:hover { background-color: #30363d; }

        #loader { text-align: center; font-size: 18px; padding: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TeamAlfaSec - CVE Report</h1>
        <div id="file-count">Scanning files...</div>
    </header>

    <div id="loader">Fetching latest files from GitHub...</div>
    <div id="file-list"></div>
</div>

<script>
    // Apnar repo information
    const owner = 'teamalfasec';
    const repo = 'cve';
    const fileListElement = document.getElementById('file-list');
    const loader = document.getElementById('loader');

    async function fetchFiles() {
        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/`);
            const files = await response.json();

            loader.style.display = 'none';
            document.getElementById('file-count').innerText = `${files.length} Files found`;

            files.forEach(file => {
                // index.html nijei jate list-e na thake tar jonno
                if (file.name === 'index.html') return;

                const card = document.createElement('div');
                card.className = 'file-card';

                // File URL (GitHub Pages link)
                const fileUrl = `https://${owner}.github.io/${repo}/${file.name}`;

                card.innerHTML = `
                    <div class="file-name">${file.name}</div>
                    <div class="actions">
                        <a href="${fileUrl}" target="_blank" class="btn-open">Open Tab</a>
                        <button class="btn-copy" onclick="copyToClipboard('${fileUrl}')">Copy Link</button>
                    </div>
                `;
                fileListElement.appendChild(card);
            });
        } catch (error) {
            loader.innerHTML = "Error loading files. Please check internet or repo visibility.";
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Link copied to clipboard!');
        });
    }

    fetchFiles();
</script>

</body>
</html>
